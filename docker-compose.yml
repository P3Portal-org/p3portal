# p3portal.org
# Container-Image-Registry (GHCR):
#   Core (AGPLv3, voll quelloffen): ghcr.io/p3portal-org/p3portal:latest
#   Plus (Source-Available, freischaltbar via Lizenz/30-Tage-Test):
#                                   ghcr.io/p3portal-org/p3portal-plus:latest
# Die meisten Plus-Funktionen (Stacks, Topologie, Auto-Snapshots, Firewall-Deklaration, …)
# laufen NUR mit dem Plus-Image. Zum Wechseln die `image:`-Zeilen der Dienste
# `portal` und `celery-worker` auf das Plus-Image umstellen (siehe Kommentar dort).

networks:
  portal-net:
    driver: bridge

services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    networks:
      - portal-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m

  celery-worker:
    # Core-Image. Für Plus stattdessen: ghcr.io/p3portal-org/p3portal-plus:latest
    image: ghcr.io/p3portal-org/p3portal:latest
    restart: unless-stopped
    networks:
      - portal-net
    command: celery -A backend.celery_app worker --beat -l info
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - ./ansible:/app/ansible
      - ./packer:/app/packer
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    depends_on:
      - valkey

  portal:
    # Core-Image. Für Plus stattdessen: ghcr.io/p3portal-org/p3portal-plus:latest
    image: ghcr.io/p3portal-org/p3portal:latest
    restart: unless-stopped
    networks:
      - portal-net
    ports:
      - "8443:8443"
      - "8103:8103"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - ./ansible:/app/ansible
      - ./packer:/app/packer
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    depends_on:
      - valkey
