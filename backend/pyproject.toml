# p3portal.org
# pytest configuration for the backend test suite.
#
# Why session-scoped fixture AND test loops:
# The per-file async fixtures (client/db) are session-scoped (default below) and
# call init_db(), so the AsyncEngine/connection pool is bound to the session
# event loop. With the default function-scoped *test* loop, the test body then
# uses that engine from a different loop, which asyncpg rejects with
# "Task got Future attached to a different loop" (CI postgres matrix, S562/S588).
# aiosqlite tolerated the mismatch, asyncpg does not. Pinning the test loop to
# the session scope as well keeps engine creation, use and disposal on one loop.
# Per-test state isolation for postgres is handled by the _reset_pg_schema
# autouse fixture in db/conftest_postgres.py (DROP+CREATE SCHEMA per test),
# mirroring SQLite's fresh tmp_path database per test.

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
