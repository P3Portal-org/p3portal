name: Backend Tests

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: pytest (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests (SQLite)
        if: matrix.db == 'sqlite'
        env:
          SECRET_KEY: test_secret_key_32_chars_for_tests
        run: |
          cd backend
          python -m pytest -x -q --tb=short

      # PROJ-71 Phase 2: Der vollständige Test-Lauf ist gegen PostgreSQL grün
      # (testcontainers postgres:17-alpine; 2144 passed / 0 failed, lokal gegen
      # postgres:17 verifiziert). Test-Fixtures portabel (ON CONFLICT statt
      # INSERT OR IGNORE), echte PG-App-Bugs gefixt (get_sync_engine-Passwort,
      # Boolean-Spalten, ssh-key-409), plus_behavior-Singleton-Cleanup in
      # backend/conftest.py → daher jetzt BLOCKIEREND (kein continue-on-error).
      # PostgreSQL bleibt im Setup-Wizard als "experimental" markiert bis zur
      # manuellen Maintainer-Freigabe nach echtem Betriebstest.
      - name: Run tests (PostgreSQL)
        if: matrix.db == 'postgres'
        env:
          SECRET_KEY: test_secret_key_32_chars_for_tests
          TEST_DB: postgres
        run: |
          cd backend
          python -m pytest -x -q --tb=short --db=postgres
